<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BeautyBook</title>
  <script src="https://telegram.org"></script>
  <style>
    :root {
      --primary-color: #534AB7;
      --bg-color: var(--tg-theme-bg-color, #ffffff);
      --text-color: var(--tg-theme-text-color, #000000);
      --hint-color: var(--tg-theme-hint-color, #888888);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #f7f7f7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      padding: 16px;
      padding-bottom: 80px; /* Место под MainButton */
    }

    .user-hello {
      background: #E1F5EE;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #085041;
      display: none; /* Покажем, когда данные загрузятся */
    }

    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: #EEEDFE; color: var(--primary-color);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 600;
    }

    .master-name { font-size: 18px; font-weight: 700; }
    .master-spec { font-size: 13px; color: var(--hint-color); margin-top: 2px; }
    .rating { font-size: 12px; color: #BA7517; margin-top: 4px; }

    .section-title {
      font-size: 13px; font-weight: 600; color: var(--hint-color);
      margin: 24px 0 12px; text-transform: uppercase; letter-spacing: 0.8px;
    }

    .service {
      background: var(--secondary-bg);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }

    .service.selected {
      border-color: var(--primary-color);
      background: #EEEDFE;
    }

    .service-name { font-size: 15px; font-weight: 600; }
    .service-dur { font-size: 13px; color: var(--hint-color); margin-top: 2px; }
    .service-price { font-size: 15px; font-weight: 700; color: var(--primary-color); }
  </style>
</head>
<body>

<div id="hello" class="user-hello"></div>

<div class="header">
  <div class="avatar">АС</div>
  <div>
    <div class="master-name">Анна Смирнова</div>
    <div class="master-spec">Маникюр, педикюр, брови</div>
    <div class="rating">★ 4.9 · 128 отзывов</div>
  </div>
</div>

<div class="section-title">Доступные услуги</div>

<div class="service" onclick="selectService(this, 'Маникюр + покрытие', 1800)">
  <div>
    <div class="service-name">Маникюр + покрытие</div>
    <div class="service-dur">75 мин</div>
  </div>
  <div class="service-price">1 800 ₽</div>
</div>

<div class="service" onclick="selectService(this, 'Педикюр', 2200)">
  <div>
    <div class="service-name">Педикюр</div>
    <div class="service-dur">90 мин</div>
  </div>
  <div class="service-price">2 200 ₽</div>
</div>

<div class="service" onclick="selectService(this, 'Коррекция бровей', 900)">
  <div>
    <div class="service-name">Коррекция бровей</div>
    <div class="service-dur">30 мин</div>
  </div>
  <div class="service-price">900 ₽</div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  let selectedService = null;

  // Инициализация
  tg.expand();
  tg.ready();
  tg.setHeaderColor('secondary_bg_color');

  // Приветствие пользователя
  const user = tg.initDataUnsafe?.user;
  const helloBox = document.getElementById('hello');
  if (user) {
    helloBox.textContent = `Привет, ${user.first_name || 'гость'}! Выбери услугу 👇`;
    helloBox.style.display = 'block';
  }

  function selectService(el, name, price) {
    // 1. Легкая вибрация при выборе
    tg.HapticFeedback.impactOccurred('light');

    // 2. Визуальное выделение
    document.querySelectorAll('.service').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');

    selectedService = { name, price };

    // 3. Настройка нативной главной кнопки (MainButton)
    tg.MainButton.setParams({
      text: `ЗАПИСАТЬСЯ (${price} ₽)`,
      color: '#534AB7',
      text_color: '#ffffff',
      is_visible: true,
      is_active: true
    });
  }

  // Обработка нажатия на главную кнопку
  tg.MainButton.onClick(() => {
    if (!selectedService) return;

    tg.showConfirm(`Записаться на "${selectedService.name}"?`, (confirm) => {
      if (confirm) {
        // Отправляем данные боту (закроет Mini App автоматически)
        tg.sendData(JSON.stringify({
          action: 'booking',
          service: selectedService.name,
          price: selectedService.price
        }));
      }
    });
  });
</script>

</body>
</html>
