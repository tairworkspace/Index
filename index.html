<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeautyBook</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 16px;
    }
    .header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: #EEEDFE; color: #3C3489;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600;
    }
    .master-name { font-size: 17px; font-weight: 600; }
    .master-spec { font-size: 13px; color: #888; margin-top: 2px; }
    .rating { font-size: 12px; color: #BA7517; margin-top: 2px; }
    .section { font-size: 13px; font-weight: 600; color: #888;
      margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .service {
      background: #f7f7f7; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; border: 2px solid transparent; transition: all .15s;
    }
    .service.selected { border-color: #534AB7; background: #EEEDFE; }
    .service-name { font-size: 14px; font-weight: 500; }
    .service-dur { font-size: 12px; color: #888; margin-top: 2px; }
    .service-price { font-size: 14px; font-weight: 600; color: #534AB7; }
    .btn {
      width: 100%; padding: 15px; border-radius: 14px;
      background: #534AB7; color: #fff; font-size: 16px;
      font-weight: 600; border: none; cursor: pointer;
      margin-top: 24px; transition: opacity .15s;
    }
    .btn:disabled { opacity: 0.4; }
    .user-hello {
      background: #E1F5EE; border-radius: 12px;
      padding: 12px 16px; margin-bottom: 20px;
      font-size: 14px; color: #085041;
    }
  </style>
</head>
<body>

<div class="user-hello" id="hello">Загрузка...</div>

<div class="header">
  <div class="avatar">АС</div>
  <div>
    <div class="master-name">Анна Смирнова</div>
    <div class="master-spec">Маникюр, педикюр, брови</div>
    <div class="rating">★ 4.9 · 128 отзывов</div>
  </div>
</div>

<div class="section">Выбери услугу</div>

<div class="service" onclick="select(this, 'Маникюр + покрытие', 1800)">
  <div>
    <div class="service-name">Маникюр + покрытие</div>
    <div class="service-dur">75 мин</div>
  </div>
  <div class="service-price">1 800 ₽</div>
</div>

<div class="service" onclick="select(this, 'Педикюр', 2200)">
  <div>
    <div class="service-name">Педикюр</div>
    <div class="service-dur">90 мин</div>
  </div>
  <div class="service-price">2 200 ₽</div>
</div>

<div class="service" onclick="select(this, 'Коррекция бровей', 900)">
  <div>
    <div class="service-name">Коррекция бровей</div>
    <div class="service-dur">30 мин</div>
  </div>
  <div class="service-price">900 ₽</div>
</div>

<div class="service" onclick="select(this, 'Маникюр + педикюр', 3500)">
  <div>
    <div class="service-name">Маникюр + педикюр</div>
    <div class="service-dur">2.5 часа</div>
  </div>
  <div class="service-price">3 500 ₽</div>
</div>

<button class="btn" id="btn" disabled onclick="book()">Выбери услугу</button>

<script>
  const tg = window.Telegram.WebApp
  tg.expand()
  tg.setHeaderColor('#534AB7')

  const user = tg.initDataUnsafe?.user
  const hello = document.getElementById('hello')
  if (user) {
    hello.textContent = 'Привет, ' + (user.first_name || 'гость') + '! Выбери услугу и запишись 👇'
  } else {
    hello.textContent = 'Выбери услугу и запишись 👇'
  }

  let selected = null

  function select(el, name, price) {
    document.querySelectorAll('.service').forEach(s => s.classList.remove('selected'))
    el.classList.add('selected')
    selected = { name, price }
    const btn = document.getElementById('btn')
    btn.disabled = false
    btn.textContent = 'Записаться — ' + price.toLocaleString('ru') + ' ₽'
  }

  function book() {
    if (!selected) return
    tg.showAlert('Запись на "' + selected.name + '" оформлена! Мастер скоро подтвердит.')
  }
</script>

</body>
</html>
