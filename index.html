<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; font-family: sans-serif;
            background-color: white; 
        }
        #btn { 
            padding: 20px 40px; font-size: 20px; font-weight: bold;
            color: white; background-color: #2481cc; 
            border: none; border-radius: 15px; cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="btn">ПРОВЕРИТЬ РАБОТУ</button>

    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Логика нажатия
        document.getElementById('btn').onclick = function() {
            alert("Кнопка нажата! JavaScript работает! 🎉");
            this.style.backgroundColor = "green";
            this.innerText = "РАБОТАЕТ ✅";
            tg.expand();
        };
    </script>
</body>
</html>
