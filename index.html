<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-family: sans-serif; padding: 20px; }
        .service-card { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>✨ Наш Прайс</h2>
    <div class="service-card">
        <div>
            <strong>Маникюр</strong><br>
            <span>1500₽ • 60 мин</span>
        </div>
        <button onclick="selectService('Маникюр')">Выбрать</button>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function selectService(name) {
            tg.sendData("Выбрана услуга: " + name); // Отправляет текст обратно боту
            tg.close(); // Закрывает окно
        }
    </script>
</body>
</html>
