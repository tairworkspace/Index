<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { 
            background-color: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #000000); 
            font-family: sans-serif; margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        #welcome-screen { text-align: center; }
        .main-btn { 
            background: var(--tg-theme-button-color, #2481cc); 
            color: var(--tg-theme-button-text-color, #ffffff); 
            border: none; border-radius: 50px; padding: 15px 40px; 
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
        .content { display: none; padding: 20px; width: 100%; height: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- Экран-заставка (нужен для активации Fullscreen) -->
    <div id="welcome-screen">
        <button class="main-btn" onclick="startApp()">✨ Открыть меню</button>
    </div>

    <!-- Основной контент -->
    <div id="content" class="content">
        <h2>💎 Полноэкранный прайс</h2>
        <p>Теперь это полноценное приложение!</p>
        <button onclick="location.reload()" style="background:none; border:1px solid gray; padding:10px; border-radius:10px;">Обновить страницу</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Сразу расширяем до 80%

        function startApp() {
            // Активируем полный экран ПОСЛЕ КЛИКА
            try {
                if (tg.requestFullscreen) {
                    tg.requestFullscreen(); 
                }
            } catch (e) {
                console.log("Полный экран не поддерживается");
            }

            // Переключаем экраны
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            // Меняем цвет фона body, чтобы убрать центрирование
            document.body.style.display = 'block';
        }
    </script>
</body>
</html>
